# Run with: docker compose -f docker-compose-vllm-qwen35.yml up
# Runs on GPU 0, port 8355 — Aider + general use
# Can run alongside docker-compose-vllm-qwen35-122b.yml (122B on GPU 1, port 8356)
services:
  vllm-qwen35:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen35

    command:
      - "Sehyo/Qwen3.5-35B-A3B-NVFP4"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--trust-remote-code"
      - "--gpu-memory-utilization"
      - "0.95"
      - "--max-model-len"
      - "32768"
      - "--max-num-seqs"
      - "128"
      - "--enable-prefix-caching"
      - "--enable-chunked-prefill"
      - "--max-num-batched-tokens"
      - "16384"
      - "--tensor-parallel-size"
      - "1"
      - "--reasoning-parser"
      - "qwen3"

    ports:
      - "8356:8000"

    dns:
      - 1.1.1.1
      - 8.8.8.8

    network_mode: "bridge"

    ipc: host
    shm_size: '32gb'

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu, compute, utility]

    environment:
      - HUGGINGFACE_HUB_TOKEN=${HUGGINGFACE_HUB_TOKEN}
      - HF_TOKEN=${HUGGINGFACE_HUB_TOKEN}
      - HF_HOME=/workspace/.cache/huggingface
      - PYTHONWARNINGS=ignore::FutureWarning
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_VISIBLE_DEVICES=0
      - NCCL_DEBUG=WARN

    volumes:
      - ~/.cache/huggingface:/workspace/.cache/huggingface

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
