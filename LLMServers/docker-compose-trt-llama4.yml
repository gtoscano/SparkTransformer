# Run with: docker compose -f docker-compose-trt-llama4.yml up
# Llama 4 Scout 17B-16E NVFP4 on TRT-LLM, GPU 0, port 8355
services:
  trtllm-llama4:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc10
    container_name: trtllm_llama4
    command:
      - bash
      - -c
      - |
        set -ex

        cat > /tmp/extra-llm-api-config.yml <<'EOFCONFIG'
        print_iter_log: false
        kv_cache_config:
          dtype: "auto"
          free_gpu_memory_fraction: 0.9
        cuda_graph_config:
          enable_padding: true
        disable_overlap_scheduler: true
        EOFCONFIG

        exec trtllm-serve "$$MODEL_HANDLE" \
          --max_batch_size 64 \
          --trust_remote_code \
          --host 0.0.0.0 \
          --port 8355 \
          --extra_llm_api_options /tmp/extra-llm-api-config.yml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - HF_TOKEN=${HUGGINGFACE_HUB_TOKEN}
      - MODEL_HANDLE=nvidia/Llama-4-Scout-17B-16E-Instruct-NVFP4
    volumes:
      - ${HOME}/.cache/huggingface/:/root/.cache/huggingface/
    ports:
      - "8355:8355"
    ipc: host
    shm_size: '32gb'
    ulimits:
      memlock: -1
      stack: 67108864
    restart: unless-stopped
